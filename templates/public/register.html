{% extends "base.html" %}

{% block title %}تسجيل حساب جديد - صندوق الدفعة 109{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>
            <i class="fas fa-user-plus"></i> إنشاء حساب جديد
        </h2>
        
        <form method="POST" action="/register" id="register-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user"></i> الاسم الكامل
                </label>
                <input type="text" 
                       name="full_name" 
                       class="form-control" 
                       placeholder="أدخل اسمك الثلاثي"
                       required>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-phone-alt"></i> رقم الموبايل
                </label>
                <input type="tel" 
                       name="phone" 
                       id="phone"
                       class="form-control" 
                       placeholder="مثال: 0123456789"
                       pattern="^(010|011|012|015)[0-9]{8}$"
                       required>
                <small class="text-muted">رقم مصري صحيح يبدأ بـ 010، 011، 012، أو 015</small>
                <div id="phone-feedback" class="invalid-feedback"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-lock"></i> كلمة المرور
                </label>
                <input type="password" 
                       name="password" 
                       id="password"
                       class="form-control" 
                       placeholder="6 أحرف على الأقل"
                       minlength="6"
                       required>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-check-circle"></i> تأكيد كلمة المرور
                </label>
                <input type="password" 
                       name="confirm_password" 
                       id="confirm_password"
                       class="form-control" 
                       placeholder="أعد إدخال كلمة المرور"
                       required>
                <div id="password-feedback" class="invalid-feedback"></div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-user-plus"></i> إنشاء الحساب
            </button>
        </form>
        
        <div class="auth-footer">
            <p>لديك حساب بالفعل؟ <a href="/login">تسجيل الدخول</a></p>
            <p><a href="/forgot-password">نسيت كلمة المرور؟</a></p>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    const phoneInput = document.getElementById('phone');
    let phoneCheckTimeout;
    
    function validatePasswordMatch() {
        if (password.value !== confirmPassword.value) {
            confirmPassword.classList.add('is-invalid');
            document.getElementById('password-feedback').textContent = 'كلمة المرور غير متطابقة';
            return false;
        } else {
            confirmPassword.classList.remove('is-invalid');
            return true;
        }
    }
    
    password.addEventListener('input', validatePasswordMatch);
    confirmPassword.addEventListener('input', validatePasswordMatch);
    
    phoneInput.addEventListener('input', function() {
        clearTimeout(phoneCheckTimeout);
        const phone = this.value.trim();
        
        if (phone.length >= 10 && /^[0-9]+$/.test(phone)) {
            phoneCheckTimeout = setTimeout(async function() {
                try {
                    const response = await fetch(`/api/check-phone?phone=${encodeURIComponent(phone)}`);
                    const data = await response.json();
                    
                    if (data.exists) {
                        phoneInput.classList.add('is-invalid');
                        document.getElementById('phone-feedback').textContent = '⚠️ هذا الرقم مسجل مسبقاً. يرجى استخدام رقم آخر أو تسجيل الدخول.';
                    } else {
                        phoneInput.classList.remove('is-invalid');
                    }
                } catch (error) {
                    console.error('Error checking phone:', error);
                }
            }, 500);
        }
    });
    
    const form = document.getElementById('register-form');
    form.addEventListener('submit', async function(event) {
        if (!validatePasswordMatch()) {
            event.preventDefault();
            alert('كلمة المرور غير متطابقة');
            return;
        }
        
        const phone = phoneInput.value.trim();
        if (phone) {
            try {
                const response = await fetch(`/api/check-phone?phone=${encodeURIComponent(phone)}`);
                const data = await response.json();
                if (data.exists) {
                    event.preventDefault();
                    alert('⚠️ هذا الرقم مسجل مسبقاً. يرجى استخدام رقم آخر أو تسجيل الدخول.');
                    return;
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
    });
});
</script>
{% endblock %}
