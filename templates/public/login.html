{% extends "base.html" %}

{% block title %}تسجيل الدخول - صندوق الدفعة 109{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>
            <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </h2>
        
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-phone-alt"></i> رقم الموبايل
                </label>
                <input type="tel" 
                       name="phone" 
                       class="form-control" 
                       placeholder="مثال: 0123456789"
                       required>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-lock"></i> كلمة المرور
                </label>
                <input type="password" 
                       name="password" 
                       class="form-control" 
                       placeholder="أدخل كلمة المرور"
                       required>
            </div>
            
            <div class="form-group d-flex justify-content-between align-items-center">
                <label class="d-flex align-items-center gap-1">
                    <input type="checkbox" name="remember"> تذكرني
                </label>
                <a href="/forgot-password" class="text-primary">نسيت كلمة المرور؟</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </form>
        
        <div class="auth-footer">
            <p>ليس لديك حساب؟ <a href="/register">إنشاء حساب جديد</a></p>
        </div>
    </div>
</div>
{% endblock %}
