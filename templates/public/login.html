{% extends "base.html" %}

{% block title %}تسجيل الدخول - صندوق الدفعة 109{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-phone-alt"></i> رقم الموبايل
                        </label>
                        <input type="tel" 
                               name="phone" 
                               class="form-control" 
                               placeholder="مثال: 0123456789"
                               required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-lock"></i> كلمة المرور
                        </label>
                        <input type="password" 
                               name="password" 
                               class="form-control" 
                               placeholder="أدخل كلمة المرور"
                               required>
                    </div>
                    
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">تذكرني</label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p><a href="/forgot-password" class="text-decoration-none">نسيت كلمة المرور؟</a></p>
                    <p class="mb-0">ليس لديك حساب؟ <a href="/register" class="text-decoration-none">إنشاء حساب جديد</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
