{% extends "base.html" %}

{% block title %}الرئيسية - صندوق الدفعة 109{% endblock %}

{% block content %}
<div class="hero text-center py-5" style="background: linear-gradient(135deg, #8b5cf6, #6d28d9); border-radius: 20px; color: white;">
    <h1 class="display-4 fw-bold">صندوق الدفعة 109</h1>
    <p class="lead mt-3">نظام متكامل لإدارة التبرعات والشهداء</p>
    
    {% if current_user.is_authenticated %}
        <div class="mt-4">
            <p class="lead">مرحباً بك {{ current_user.full_name }}</p>
            <a href="/profile" class="btn btn-light btn-lg rounded-pill px-4">
                <i class="fas fa-user"></i> الذهاب إلى ملفي الشخصي
            </a>
        </div>
    {% endif %}
</div>
{% endblock %}
