{% extends "base.html" %}

{% block title %}استرجاع كلمة المرور - صندوق الدفعة 109{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="fas fa-key"></i> استرجاع كلمة المرور</h4>
            </div>
            <div class="card-body p-4">
                <div id="step1">
                    <p class="text-center mb-4">أدخل رقم موبايلك المسجل، وسنرسل لك كود تحقق</p>
                    
                    <form id="send-code-form">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-phone-alt"></i> رقم الموبايل
                            </label>
                            <input type="tel" 
                                   class="form-control" 
                                   id="reset-phone" 
                                   name="phone" 
                                   placeholder="مثال: 0123456789"
                                   required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2" id="send-code-btn">
                            <i class="fas fa-paper-plane"></i> إرسال كود التحقق
                        </button>
                    </form>
                </div>
                
                <div id="step2" style="display: none;">
                    <p class="text-center mb-4">تم إرسال كود التحقق إلى رقم هاتفك</p>
                    
                    <form id="verify-code-form">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-qrcode"></i> كود التحقق
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="reset-code" 
                                   name="code" 
                                   placeholder="أدخل الكود المكون من 6 أرقام"
                                   required
                                   maxlength="6">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-lock"></i> كلمة المرور الجديدة
                            </label>
                            <input type="password" 
                                   class="form-control" 
                                   id="new-password" 
                                   name="new_password" 
                                   placeholder="أدخل كلمة المرور الجديدة (6 أحرف على الأقل)"
                                   required
                                   minlength="6">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-check-circle"></i> تأكيد كلمة المرور
                            </label>
                            <input type="password" 
                                   class="form-control" 
                                   id="confirm-new-password" 
                                   name="confirm_password" 
                                   placeholder="أعد إدخال كلمة المرور"
                                   required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="fas fa-save"></i> إعادة تعيين كلمة المرور
                        </button>
                    </form>
                </div>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p><a href="/login" class="text-decoration-none">العودة إلى تسجيل الدخول</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentPhone = '';

document.getElementById('send-code-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const phone = document.getElementById('reset-phone').value.trim();
    const submitBtn = document.getElementById('send-code-btn');
    
    if (!phone) {
        alert('يرجى إدخال رقم الموبايل');
        return;
    }
    
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
    
    try {
        const response = await fetch('/api/send-reset-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone })
        });
        const data = await response.json();
        
        if (data.success) {
            currentPhone = phone;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            alert('تم إرسال كود التحقق إلى رقم هاتفك');
        } else {
            alert(data.message || 'حدث خطأ، يرجى المحاولة مرة أخرى');
        }
    } catch (error) {
        alert('حدث خطأ في الاتصال بالخادم');
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال كود التحقق';
    }
});

document.getElementById('verify-code-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const code = document.getElementById('reset-code').value.trim();
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-new-password').value;
    
    if (!code) {
        alert('يرجى إدخال كود التحقق');
        return;
    }
    
    if (newPassword.length < 6) {
        alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
        return;
    }
    
    if (newPassword !== confirmPassword) {
        alert('كلمة المرور غير متطابقة');
        return;
    }
    
    try {
        const response = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                phone: currentPhone, 
                code: code, 
                new_password: newPassword 
            })
        });
        const data = await response.json();
        
        if (data.success) {
            alert('تم تغيير كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول');
            setTimeout(() => {
                window.location.href = "/login";
            }, 2000);
        } else {
            alert(data.message || 'كود التحقق غير صحيح أو منتهي الصلاحية');
        }
    } catch (error) {
        alert('حدث خطأ في الاتصال بالخادم');
    }
});
</script>
{% endblock %}
