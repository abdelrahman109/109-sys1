server {
    listen 80;
    server_name _;

    client_max_body_size 8M;

    location /static/ {
        alias /home/ubuntu/109-sys/static/;
    }

    location /uploads/ {
        alias /home/ubuntu/109-sys/uploads/;
    }

    location /generated/ {
        alias /home/ubuntu/109-sys/generated/;
        internal;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
